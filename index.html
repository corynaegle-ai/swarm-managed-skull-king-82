<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skull King - Vanilla JS App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <header class="app-header">
            <h1>Skull King</h1>
        </header>
        <main class="app-main">
            <div id="game-container" class="game-container">
                <section id="current-round" class="round-section">
                    <h2>Round <span id="round-number">1</span></h2>
                    <div id="phase-container" class="phase-container">
                        <p class="welcome-message">Welcome to the app. Loading...</p>
                    </div>
                </section>
                <section id="scoreboard" class="scoreboard-section">
                    <h2>Scoreboard</h2>
                    <table id="score-table" class="score-table">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>Bid</th>
                                <th>Tricks</th>
                                <th>Score</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="score-body">
                        </tbody>
                    </table>
                </section>
            </div>
        </main>
        <footer class="app-footer">
            <p>&copy; 2024 Skull King Game</p>
        </footer>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
