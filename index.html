<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skull King - Vanilla JS App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <header class="app-header">
            <h1>Skull King</h1>
        </header>
        <main class="app-main" id="main-game-container">
            <section class="scoreboard-section">
                <h2>Game Scoreboard</h2>
                <div class="scoreboard-wrapper">
                    <table class="scoreboard-table">
                        <thead>
                            <tr>
                                <th class="player-name-col">Player Name</th>
                                <th class="bid-col">Bid</th>
                                <th class="tricks-col">Tricks Taken</th>
                                <th class="round-score-col">Round Score</th>
                                <th class="total-score-col">Total Score</th>
                            </tr>
                        </thead>
                        <tbody id="scoreboard-body">
                            <!-- Player rows dynamically generated -->
                        </tbody>
                    </table>
                </div>
                <div class="scoreboard-controls">
                    <button id="calculate-score-btn" class="calculate-btn">Calculate Score</button>
                </div>
            </section>
        </main>
        <footer class="app-footer">
            <p>&copy; 2024 Skull King Game</p>
        </footer>
    </div>
    <script type="module" src="js/gameController.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
