<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tricks & Bonus Entry - Skull King</title>
    <link rel="stylesheet" href="css/tricksEntry.css">
</head>
<body>
    <div class="tricks-entry-container">
        <h1>Tricks & Bonus Entry</h1>
        
        <div class="round-info">
            <p>Round <span id="currentRound">1</span></p>
        </div>

        <form id="tricksEntryForm" class="tricks-form">
            <div id="playersContainer" class="players-container">
                <!-- Player rows will be dynamically populated here by JavaScript -->
            </div>

            <div class="button-group">
                <button type="submit" id="confirmBtn" class="btn btn-primary">Confirm</button>
                <button type="button" id="backBtn" class="btn btn-secondary">Back to Game</button>
            </div>
        </form>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
    </div>

    <script src="js/tricksEntry.js"></script>
</body>
</html>
