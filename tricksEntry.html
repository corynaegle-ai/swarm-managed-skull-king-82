<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tricks Entry - Skull King</title>
    <link rel="stylesheet" href="css/tricksEntry.css">
</head>
<body>
    <div class="tricks-entry-container">
        <h1>Tricks Entry</h1>
        
        <div class="round-info">
            <p><strong>Current Round:</strong> <span id="roundNumber">1</span></p>
        </div>
        
        <form id="tricksEntryForm" class="tricks-form">
            <div class="players-container" id="playersContainer">
                <!-- Template player entry structure -->
                <div class="player-entry">
                    <h3 class="player-name">Player 1</h3>
                    
                    <div class="player-bid-display">
                        <label for="player1Bid">Bid:</label>
                        <span id="player1Bid" class="bid-value">0</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="player1Tricks">Tricks Taken:</label>
                        <input 
                            type="number" 
                            id="player1Tricks" 
                            name="player1Tricks" 
                            min="0" 
                            max="1" 
                            value="0"
                            required
                            aria-label="Number of tricks taken by Player 1"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="player1Bonus">Bonus Points:</label>
                        <input 
                            type="number" 
                            id="player1Bonus" 
                            name="player1Bonus" 
                            min="0" 
                            value="0"
                            required
                            aria-label="Bonus points for Player 1"
                        >
                    </div>
                </div>
                
                <div class="player-entry">
                    <h3 class="player-name">Player 2</h3>
                    
                    <div class="player-bid-display">
                        <label for="player2Bid">Bid:</label>
                        <span id="player2Bid" class="bid-value">0</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="player2Tricks">Tricks Taken:</label>
                        <input 
                            type="number" 
                            id="player2Tricks" 
                            name="player2Tricks" 
                            min="0" 
                            max="1" 
                            value="0"
                            required
                            aria-label="Number of tricks taken by Player 2"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="player2Bonus">Bonus Points:</label>
                        <input 
                            type="number" 
                            id="player2Bonus" 
                            name="player2Bonus" 
                            min="0" 
                            value="0"
                            required
                            aria-label="Bonus points for Player 2"
                        >
                    </div>
                </div>
                
                <div class="player-entry">
                    <h3 class="player-name">Player 3</h3>
                    
                    <div class="player-bid-display">
                        <label for="player3Bid">Bid:</label>
                        <span id="player3Bid" class="bid-value">0</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="player3Tricks">Tricks Taken:</label>
                        <input 
                            type="number" 
                            id="player3Tricks" 
                            name="player3Tricks" 
                            min="0" 
                            max="1" 
                            value="0"
                            required
                            aria-label="Number of tricks taken by Player 3"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="player3Bonus">Bonus Points:</label>
                        <input 
                            type="number" 
                            id="player3Bonus" 
                            name="player3Bonus" 
                            min="0" 
                            value="0"
                            required
                            aria-label="Bonus points for Player 3"
                        >
                    </div>
                </div>
                
                <div class="player-entry">
                    <h3 class="player-name">Player 4</h3>
                    
                    <div class="player-bid-display">
                        <label for="player4Bid">Bid:</label>
                        <span id="player4Bid" class="bid-value">0</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="player4Tricks">Tricks Taken:</label>
                        <input 
                            type="number" 
                            id="player4Tricks" 
                            name="player4Tricks" 
                            min="0" 
                            max="1" 
                            value="0"
                            required
                            aria-label="Number of tricks taken by Player 4"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="player4Bonus">Bonus Points:</label>
                        <input 
                            type="number" 
                            id="player4Bonus" 
                            name="player4Bonus" 
                            min="0" 
                            value="0"
                            required
                            aria-label="Bonus points for Player 4"
                        >
                    </div>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" id="confirmBtn" class="btn btn-primary">Confirm</button>
                <button type="button" id="backBtn" class="btn btn-secondary">Back to Game</button>
            </div>
        </form>
    </div>
    
    <script src="js/tricksEntry.js"></script>
</body>
</html>
